version: '3.8'

services:
  app:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: lansia-papua-app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - ../../.env
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    networks:
      - lansia-net

  nginx:
    image: nginx:1.27-alpine
    container_name: lansia-papua-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../public:/var/www/html/public:ro
      - app-storage:/var/www/html/storage/app:ro
    networks:
      - lansia-net

  queue-analytics:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: lansia-papua-queue-analytics
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    command: php artisan queue:work --queue=analytics --tries=3 --timeout=180 --sleep=2 --max-time=3600
    env_file:
      - ../../.env
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    networks:
      - lansia-net

  queue-default:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: lansia-papua-queue-default
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    command: php artisan queue:work --queue=exports,default --tries=3 --timeout=600 --sleep=2 --max-time=3600
    env_file:
      - ../../.env
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    networks:
      - lansia-net

  scheduler:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: lansia-papua-scheduler
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file:
      - ../../.env
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    networks:
      - lansia-net

  postgres:
    image: postgres:16-alpine
    container_name: lansia-papua-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lansia_papua}
      POSTGRES_USER: ${DB_USERNAME:-lansia_papua}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lansia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lansia_papua}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lansia-papua-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - lansia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  app-storage:
  app-logs:

networks:
  lansia-net:
    driver: bridge
