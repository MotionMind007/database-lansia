[PHP]
memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 120
max_input_time = 60
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
date.timezone = Asia/Jayapura
session.cookie_secure = On
session.cookie_httponly = On
session.cookie_samesite = Lax
expose_php = Off
